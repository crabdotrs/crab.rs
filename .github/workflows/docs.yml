name: Documentation

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Build Rust docs
        run: cd crab.rs && cargo doc --workspace --no-deps

      - name: Add index redirect
        run: |
          mkdir -p crab.rs/target/doc/_site
          cp -r crab.rs/target/doc/* crab.rs/target/doc/_site/ || true
          echo '<meta http-equiv="refresh" content="0;url=crab_cli/index.html">' > crab.rs/target/doc/_site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crab.rs/target/doc/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
