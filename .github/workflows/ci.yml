name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crab.rs

      - name: Check formatting
        run: cd crab.rs && cargo fmt --all -- --check

      - name: Run clippy
        run: cd crab.rs && cargo clippy --workspace -- -D warnings

      - name: Build
        run: cd crab.rs && cargo build --workspace

      - name: Run tests
        run: cd crab.rs && cargo test --workspace

      - name: Build release
        run: cd crab.rs && cargo build --release --workspace

      - name: Test cookie_shop_api example
        run: |
          cd examples/cookie_shop_api
          ../../crab.rs/target/release/crab build
          ../../crab.rs/target/release/crab run
